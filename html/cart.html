<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Kit - Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Bayon&family=Bungee&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header>
        <h1>1st Kit</h1>
        <nav>
            <li><a href="home.html">Home</a></li>
            <li><a href="store.html">Store</a></li>
            <li id="cart-link"><a href="cart.html">Cart</a></li>

            <div class="search-container">
                <input type="text" placeholder="Search..." name="search">
                <button type="submit"><i class="fa fa-search"></i></button>
            </div>
        </nav>
    </header>

    <main>
        <div class="cart-txt">
            <h2>Your Cart</h2>
        </div>

        <div class="cart-container">
            <div class="cart-header">
                <span>Name</span>
                <span>Size</span>
                <span>Quantity</span>
                <span>Price</span>
            </div>

            <div class="cart-footer">
                <div class="total-section">
                    <span class="total-label">Total : 0 THB</span>
                    <button class="buy-btn">Buy</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ฟังก์ชันสำหรับแสดงผลตะกร้าสินค้า
        function renderCart() {
            // ดึงข้อมูลจาก localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const footer = document.querySelector('.cart-footer');
            const totalLabel = document.querySelector('.total-label');

            // ลบรายการเก่าที่แสดงอยู่ (เพื่อไม่ให้ซ้ำตอน render ใหม่)
            document.querySelectorAll('.cart-item').forEach(item => item.remove());

            let totalPrice = 0;

            if (cart.length === 0) {
                // ถ้าไม่มีสินค้า
                const emptyMsg = `
                <div class="cart-item" style="justify-content: center; padding: 40px; color: #666; font-size: 1.5rem;">
                    YOUR CART IS EMPTY.
                </div>`;
                footer.insertAdjacentHTML('beforebegin', emptyMsg);
                totalLabel.innerText = `TOTAL : 0 THB`;
                return;
            }

            // วนลูปสร้างรายการสินค้า
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                totalPrice += itemTotal;

                const itemHTML = `
                <div class="cart-item">
                    <div class="item-info">
                        <img src="${item.img}" alt="${item.name}">
                        <span class="item-name">${item.name.toUpperCase()}</span>
                    </div>
                    <div class="item-details">
                        <span class="item-size">${item.size}</span>
                        <span class="item-qty">${item.quantity}</span>
                        <span class="item-price">${itemTotal.toLocaleString()} THB</span>
                        <button class="remove-btn" onclick="removeItem(${index})"><i class="fa fa-minus"></i></button>
                    </div>
                </div>`;

                // แทรก HTML เข้าไปก่อนบรรทัด Footer
                footer.insertAdjacentHTML('beforebegin', itemHTML);
            });

            // อัปเดตราคารวม
            totalLabel.innerText = `TOTAL : ${totalPrice.toLocaleString()} THB`;
        }

        // ฟังก์ชันลบ/ลดจำนวนสินค้า
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            // ถ้ามีจำนวนมากกว่า 1 ให้ลดจำนวนลงทีละ 1
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                // ถ้าเหลือ 1 ให้ลบออกจากตะกร้าเลย
                cart.splice(index, 1);
            }

            // บันทึกค่าใหม่ลง localStorage และสั่งให้แสดงผลใหม่
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // เรียกใช้ฟังก์ชันตอนโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>

</html>
</body>

</html>
